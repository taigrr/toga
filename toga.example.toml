# Toga configuration — all values can also be set via TOGA_ env vars.
# e.g. TOGA_PORT=":6060", TOGA_STORAGE_TYPE="s3"

port = ":6060"
storage_type = "disk"
log_level = "info"
network_mode = "fallback"
